services:
  backend:
    build: ./backend
    container_name: student-backend

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app

    networks:
      - student-network

  frontend:
    build: ./frontend
    container_name: student-frontend

    ports:
      - "3000:3000"

    environment:
      - BACKEND_URL=http://backend:5000

    depends_on:
      - backend

    networks:
      - student-network

networks:
  student-network: